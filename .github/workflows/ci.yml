name: CI

# Build + test on every PR into main, so a green check gates the merge.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore InvestAdvisor.slnx

      - name: Build
        run: dotnet build InvestAdvisor.slnx -c Release --no-restore

      - name: Test
        run: dotnet test InvestAdvisor.slnx -c Release --no-build --verbosity normal
